<!DOCTYPE html>
<html>

<head>
    <meta charset="UTF-8">
    <title>Habit Arena</title>

    <style>
        body {
            font-family: 'Segoe UI', Arial;
            background: linear-gradient(135deg, #e0f2fe, #f8fafc);
            margin: 0;
            padding: 0;
            color: #1e293b;
        }

        .container {
            width: 100%;
            max-width: 1000px;
            margin: 50px auto;
            background: white;
            padding: 40px;
            border-radius: 18px;
            box-shadow: 0 8px 30px rgba(0, 0, 0, 0.1);
            text-align: center;
        }

        h1 {
            font-size: 46px;
            margin-bottom: 10px;
        }

        .logoA {
            display: inline-block;
            font-size: 50px;
            font-weight: bold;
            background: linear-gradient(45deg, #0ea5e9, #0020d8);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        .subtitle {
            color: #64748b;
            font-size: 16px;
            margin-bottom: 35px;
        }

        .forms {
            display: flex;
            justify-content: center;
            gap: 30px;
            flex-wrap: wrap;
        }

        .formCard {
            flex: 1;
            min-width: 320px;
            background: #f8fafc;
            padding: 30px;
            border-radius: 15px;
            box-shadow: 0 5px 15px rgba(0,0,0,0.08);
        }

        .formCard h2 {
            margin-bottom: 20px;
            color: #2563eb;
        }

        input {
            width: 90%;
            padding: 12px;
            margin: 12px auto;
            display: block;
            border-radius: 8px;
            border: 1px solid #cbd5e1;
            background: white;
            font-size: 15px;
        }

        input:focus {
            outline: none;
            border-color: #2563eb;
            box-shadow: 0 0 6px rgba(37,99,235,0.25);
        }

        button {
            margin-top: 15px;
            padding: 10px 22px;
            border: none;
            border-radius: 8px;
            cursor: pointer;
            background: linear-gradient(45deg,#0ea5e9,#0020d8);
            color: white;
            font-size: 15px;
            transition: .25s;
        }

        button:hover {
            transform: translateY(-2px);
            box-shadow: 0 6px 15px rgba(37,99,235,.3);
        }

        footer {
            margin-top: 40px;
            color: #64748b;
            font-size: 14px;
        }

        #toast {
            position: fixed;
            top: 20px;
            right: 20px;
            background: #22c55e;
            color: white;
            padding: 15px 25px;
            border-radius: 10px;
            font-weight: bold;
            opacity: 0;
            transition: .4s;
            pointer-events: none;
            box-shadow: 0 5px 15px rgba(0,0,0,.2);
        }
    </style>
</head>

<body>

<div id="toast"></div>

<div class="container">

    <h1>
        Habit<span class="logoA">A</span>rena
    </h1>

    <p class="subtitle">
        Build Better Habits Every Day.<br>
        Stay consistent, build streaks and climb the leaderboard.
    </p>

    <div class="forms">

        <div class="formCard">

            <h2>Create Account</h2>

            <input id="regUser" placeholder="Username">

            <input id="regPass" type="password" placeholder="Password">

            <button onclick="register()">
                Register
            </button>

        </div>

        <div class="formCard">

            <h2>Welcome Back</h2>

            <input id="loginUser" placeholder="Username">

            <input id="loginPass" type="password" placeholder="Password">

            <button onclick="login()">
                Login
            </button>

        </div>

    </div>

    <footer>
        Made with ❤️ using Spring Boot, Java & MySQL
    </footer>

</div>

<script>

    let token = "";

    async function register() {

        let username = document.getElementById("regUser").value;
        let password = document.getElementById("regPass").value;

        let res = await fetch("https://habit-arena-fwxv.onrender.com/auth/register", {

            method: "POST",

            headers: {
                "Content-Type": "application/json"
            },

            body: JSON.stringify({
                username,
                password
            })

        });

        if(res.ok){
            showToast("Registered Successfully! 🎉");
        }
        else{
            showToast("Registration Failed ❌", false);
        }

    }

    async function login() {

        let username = document.getElementById("loginUser").value;
        let password = document.getElementById("loginPass").value;

        let res = await fetch("https://habit-arena-fwxv.onrender.com/auth/login", {

            method: "POST",

            headers: {
                "Content-Type": "application/json"
            },

            body: JSON.stringify({
                username,
                password
            })

        });

        if(!res.ok){
            showToast("Invalid Username or Password ❌", false);
            return;
        }

        token = await res.text();

        localStorage.setItem("token", token);

        showToast("Login Successful! 🎉");

        setTimeout(() => {

            window.location.href = "./dashboard.html";

        }, 800);

    }

    function showToast(message, success = true){

        let toast = document.getElementById("toast");

        if(success){
            toast.style.background = "#22c55e";
        }
        else{
            toast.style.background = "#ef4444";
        }

        toast.innerText = message;

        toast.style.opacity = "1";

        setTimeout(() => {

            toast.style.opacity = "0";

        },2000);

    }

</script>

</body>

</html>
